name: Jobs täglich aktualisieren

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests anthropic

      - name: Render aufwecken (90 Sek warten)
        run: |
          echo "Render aufwecken..."
          curl -s https://lebenplus-backend.onrender.com/api/myip || true
          sleep 90
          echo "Render bereit"

      - name: Scraper ausführen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      - name: Änderungen committen und pushen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Jobs aktualisiert"
          file_pattern: data/*.json
          push_options: '--force'
