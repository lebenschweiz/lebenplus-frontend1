<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs Schweiz – lebenplus-jobs.ch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --card: #18181b;
    --card-hover: #27272a;
    --border: #3f3f46;
    --accent: #f97316;
    --accent-glow: rgba(249,115,22,0.4);
    --accent2: #f43f5e;
    --text: #f8fafc;
    --text-muted: #a1a1aa;
    --success: #10b981;
    --font-head: 'Syne', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image: radial-gradient(circle at 50% 0%, rgba(249,115,22,0.05) 0%, transparent 50%);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 5%; border-bottom: 1px solid rgba(255,255,255,0.05);
    position: sticky; top: 0; background: rgba(9,9,11,0.8);
    backdrop-filter: blur(12px); z-index: 100;
    gap: 1rem;
  }
  .logo { font-family: var(--font-head); font-weight: 800; font-size: 1.4rem; color: var(--text); text-decoration: none; letter-spacing: -0.02em; white-space: nowrap; flex-shrink: 0; }
  .logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nav-links {
    display: flex; gap: 0.4rem;
    overflow-x: auto; flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 2px;
  }
  .nav-links::-webkit-scrollbar { display: none; }
  .nav-links a {
    color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;
    padding: 0.4rem 0.9rem; border-radius: 8px; transition: all 0.2s ease;
    white-space: nowrap; flex-shrink: 0;
  }
  .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-links a.active { color: var(--text); background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); }

  /* HERO */
  .hero { padding: 5rem 5% 3.5rem; max-width: 1000px; margin: 0 auto; text-align: center; }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(249,115,22,0.1); color: var(--accent);
    font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 0.4rem 1rem;
    border-radius: 50px; margin-bottom: 1.5rem;
    border: 1px solid rgba(249,115,22,0.2);
  }
  .hero h1 { font-family: var(--font-head); font-size: clamp(2rem,6vw,4.5rem); font-weight: 800; line-height: 1.1; margin-bottom: 1.2rem; letter-spacing: -0.02em; }
  .hero h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; max-width: 560px; margin: 0 auto; }
  .hero-stats { display: flex; justify-content: center; gap: 3rem; margin-top: 2.5rem; }
  .stat-num { font-family: var(--font-head); font-size: 2.2rem; font-weight: 800; color: var(--text); line-height: 1; }
  .stat-label { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.3rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

  /* SEARCH */
  .search-wrap { max-width: 800px; margin: 0 auto 3rem; padding: 0 5%; }
  .search-box {
    display: flex; gap: 0.5rem; background: var(--card);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
    padding: 0.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .search-box:focus-within { border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 4px rgba(249,115,22,0.1); }
  .search-icon { padding: 0.8rem 0.5rem 0.8rem 1rem; color: var(--text-muted); display: flex; align-items: center; }
  .search-box input { flex: 1; background: none; border: none; color: var(--text); font-size: 1rem; font-family: var(--font-body); outline: none; padding: 0.8rem 0; min-width: 0; }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none; padding: 0 1.4rem; border-radius: 12px;
    font-weight: 600; font-size: 0.95rem; cursor: pointer; font-family: var(--font-body);
    transition: transform 0.2s ease, box-shadow 0.2s ease; white-space: nowrap; flex-shrink: 0;
  }
  .search-box button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px var(--accent-glow); }

  /* JOBS */
  .jobs-wrap { max-width: 960px; margin: 0 auto; padding: 0 5% 6rem; }
  .jobs-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 0.75rem; }
  .jobs-header h2 { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; }
  .updated { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.3rem; }
  .jobs-count { font-size: 0.9rem; font-weight: 500; color: var(--accent); background: rgba(249,115,22,0.1); padding: 0.4rem 1rem; border-radius: 50px; }

  .jobs-grid { display: flex; flex-direction: column; gap: 1rem; }

  .job-card {
    background: var(--card); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 14px; padding: 1.5rem;
    transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 0.8rem;
    text-decoration: none; color: inherit;
    cursor: pointer;
  }
  .job-card::after {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: linear-gradient(to bottom, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.3s ease;
  }
  .job-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.4); background: var(--card-hover); }
  .job-card:hover::after { opacity: 1; }

  .job-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .job-logo-wrap { display: flex; align-items: center; gap: 0.9rem; }
  .job-logo {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(135deg, #27272a, #18181b);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head); font-weight: 800; font-size: 1.1rem; color: var(--text);
    flex-shrink: 0;
  }
  .job-company { color: var(--text-muted); font-size: 0.88rem; font-weight: 500; }
  .job-title { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; line-height: 1.3; color: var(--text); }
  .job-badge { background: rgba(255,255,255,0.05); color: var(--text-muted); font-size: 0.72rem; font-weight: 600; padding: 0.35rem 0.75rem; border-radius: 6px; letter-spacing: 0.05em; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05); white-space: nowrap; flex-shrink: 0; }
  .job-desc-preview { color: #d4d4d8; font-size: 0.9rem; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .job-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 0.3rem; flex-wrap: wrap; gap: 0.8rem; }
  .job-meta { display: flex; gap: 1.2rem; flex-wrap: wrap; }
  .job-meta span { display: flex; align-items: center; gap: 0.35rem; font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }
  .job-meta svg { width: 14px; height: 14px; color: var(--accent); }

  .details-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none; border-radius: 8px;
    padding: 0.55rem 1.1rem; font-size: 0.85rem; font-weight: 600;
    font-family: var(--font-body); cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    text-decoration: none; white-space: nowrap; min-height: 48px;
  }
  .details-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px var(--accent-glow); }
  .details-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  .loading, .no-jobs { text-align: center; padding: 4rem; color: var(--text-muted); font-size: 1rem; }

  /* MOBILE */
  @media (max-width: 768px) {
    body { overflow-x: hidden; }

    nav { padding: 0.9rem 4%; }
    .logo { font-size: 1.1rem; }
    .nav-links a { font-size: 0.8rem; padding: 0.4rem 0.65rem; }

    .hero { padding: 3rem 4% 2.5rem; }
    .hero h1 { font-size: clamp(1.6rem, 8vw, 2.5rem); }
    .hero p { font-size: 0.95rem; }
    .hero-stats { gap: 2rem; }
    .stat-num { font-size: 1.6rem; }
    .hero-tag { font-size: 0.72rem; }

    .search-wrap { margin-bottom: 2rem; padding: 0 4%; }
    .search-box input { font-size: 0.9rem; }
    .search-box button { padding: 0 1rem; font-size: 0.85rem; }

    .jobs-wrap { padding: 0 4% 4rem; }
    .jobs-header h2 { font-size: 1.2rem; }

    .jobs-grid { gap: 0.75rem; }

    .job-card { padding: 1.1rem; gap: 0.65rem; width: 100%; }
    .job-card:hover { transform: none; }

    .job-logo { width: 40px; height: 40px; font-size: 1rem; }
    .job-logo-wrap { gap: 0.7rem; }
    .job-company { font-size: 0.8rem; }
    .job-title { font-size: 1rem; }
    .job-badge { display: none; }

    .job-desc-preview { font-size: 0.85rem; -webkit-line-clamp: 2; }

    .job-meta span { font-size: 0.8rem; }
    .job-meta { gap: 0.75rem; }
    .job-bottom { gap: 0.65rem; }

    .details-btn { font-size: 0.82rem; padding: 0.5rem 0.9rem; min-height: 48px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">lebenplus<span>-jobs</span></a>
  <div class="nav-links">
    <a href="/pflege">Pflege</a>
    <a href="/sap">SAP</a>
    <a href="/it">IT</a>
    <a href="/lehrer">Lehrer</a>
    <a href="/aerzte">Ärzte</a>
    <a href="/finanzen">Finance</a>
    <a href="/bau">Bau</a>
    <a href="/gastronomie">Gastro</a>
    <a href="/logistik">Logistik</a>
    <a href="/" class="active">Alle Jobs</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
    Stellenanzeigen Schweiz
  </div>
  <h1>Jobs in der<br><em>Schweiz.</em></h1>
  <p>Aktuelle Stellenanzeigen aus verschiedenen Berufsfeldern – täglich aktualisiert.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num" id="totalJobs">–</div><div class="stat-label">Offene Stellen</div></div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <div class="search-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
    <input type="text" id="searchInput" placeholder="Stichwort suchen (z.B. Zürich, Buchhalter…)" oninput="filterJobs()">
    <button onclick="filterJobs()">Suchen</button>
  </div>
</div>

<div class="jobs-wrap">
  <div class="jobs-header">
    <div>
      <h2>Aktuelle Stellen</h2>
      <div class="updated" id="updatedAt"></div>
    </div>
    <div class="jobs-count" id="jobsCount"></div>
  </div>
  <div class="jobs-grid" id="jobsGrid"><div class="loading">Jobs werden geladen …</div></div>
</div>

<script>
let allJobs = [];
let currentFiltered = [];

const iconLocation = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`;
const iconDate = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>`;
const iconSalary = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>`;
const iconArrow = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>`;

async function loadJobs() {
  try {
    const r = await fetch('/data/alle-jobs.json?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    const data = await r.json();
    allJobs = data.jobs || [];
    document.getElementById('totalJobs').textContent = data.total || allJobs.length;
    document.getElementById('updatedAt').textContent = 'Zuletzt aktualisiert: ' + (data.updated || '');
    renderJobs(allJobs);
  } catch(e) {
    document.getElementById('jobsGrid').innerHTML = '<div class="no-jobs">Fehler beim Laden der Jobs.</div>';
  }
}

function stripHtml(h) { return (h||'').replace(/<[^>]*>/g,'').trim(); }

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit',year:'numeric'}); }
  catch(e) { return d; }
}

function renderJobs(jobs) {
  currentFiltered = jobs;
  document.getElementById('jobsCount').textContent = jobs.length + ' Stellen gefunden';
  if (!jobs.length) { document.getElementById('jobsGrid').innerHTML = '<div class="no-jobs">Keine passenden Stellen gefunden.</div>'; return; }
  document.getElementById('jobsGrid').innerHTML = jobs.map((job) => {
    const url = job.url || '#';
    return `
    <a class="job-card" href="${url}" target="_blank" rel="noopener noreferrer">
      <div class="job-top">
        <div class="job-logo-wrap">
          <div class="job-logo">${(job.company||'?')[0].toUpperCase()}</div>
          <div>
            <div class="job-company">${job.company||'Unbekannt'}</div>
            <div class="job-title">${job.title}</div>
          </div>
        </div>
        <span class="job-badge">Job</span>
      </div>
      ${job.description ? `<div class="job-desc-preview">${stripHtml(job.description)}</div>` : ''}
      <div class="job-bottom">
        <div class="job-meta">
          <span>${iconLocation} ${job.locations||'Schweiz'}</span>
          <span>${iconDate} ${formatDate(job.date)}</span>
          ${job.salary ? `<span>${iconSalary} ${job.salary}</span>` : ''}
        </div>
        <span class="details-btn">${iconArrow} Stelle ansehen</span>
      </div>
    </a>
  `}).join('');
}

function filterJobs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderJobs(!q ? allJobs : allJobs.filter(j =>
    (j.title||'').toLowerCase().includes(q) ||
    (j.company||'').toLowerCase().includes(q) ||
    (j.locations||'').toLowerCase().includes(q) ||
    (j.description||'').toLowerCase().includes(q)
  ));
}

loadJobs();
</script>
</body>
</html>
